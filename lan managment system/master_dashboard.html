<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Master Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    .modal { backdrop-filter: blur(4px); }
    .sidebar-link.active { background-color: #eef2ff; color: #4338ca; border-left: 4px solid #4f46e5; }
    .sidebar-link { transition: all 0.2s ease-in-out; border-left: 4px solid transparent; }
    .sidebar-link:hover { background-color: #f0f2f5; }
  </style>
</head>
<body class="flex min-h-screen">
  
    <aside class="w-64 bg-white shadow-lg flex flex-col flex-shrink-0">
    <div class="p-6 border-b text-center">
      <h1 class="text-2xl font-bold text-indigo-600">ECE Labs</h1>
      <p class="text-sm text-gray-500">Admin Panel</p>
    </div>
    <nav class="flex-grow pt-4">
      <a href="#" id="labsTab" class="sidebar-link active flex items-center px-6 py-3 text-gray-700 font-semibold">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3" viewBox="0 0 20 20" fill="currentColor"><path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v5a2 2 0 01-2 2H4a2 2 0 01-2-2v-5z" /></svg>
        Lab Management
      </a>
      <a href="#" id="requirementsTab" class="sidebar-link flex items-center px-6 py-3 text-gray-700 font-semibold">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3" viewBox="0 0 20 20" fill="currentColor"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z" /><path fill-rule="evenodd" d="M4 5a2 2 0 012-2h8a2 2 0 012 2v10a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 011-1h6a1 1 0 110 2H8a1 1 0 01-1-1zm-1 4a1 1 0 100 2h6a1 1 0 100-2H6z" clip-rule="evenodd" /></svg>
        Lab Requirements
      </a>
            <a href="#" id="suggestionsTab" class="sidebar-link flex items-center px-6 py-3 text-gray-700 font-semibold">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 5v8a2 2 0 01-2 2h-4l-4 4v-4H4a2 2 0 01-2-2V5a2 2 0 012-2h12a2 2 0 012 2zM7 8H5v2h2V8zm2 0h2v2H9V8zm4 0h2v2h-2V8z" clip-rule="evenodd" /></svg>
        Component Suggestions
      </a>
            <a href="#" id="maintenanceTab" class="sidebar-link flex items-center px-6 py-3 text-gray-700 font-semibold">
         <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0L8 7.45l-4.24 1.29c-1.54.47-2.11 2.33-1.06 3.63l3.23 3.53-1.03 4.4c-.45 1.93 1.37 3.4 3.13 2.53L10 20.45l3.97 2.4c1.76.87 3.58-.6 3.13-2.53l-1.03-4.4 3.23-3.53c1.05-1.3-.48-3.16-2.02-3.63L12 7.45l-.51-4.28zM10 15a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd" /></svg>
        Maintenance Approvals
      </a>
      <a href="#" id="usersTab" class="sidebar-link flex items-center px-6 py-3 text-gray-700 font-semibold">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" /></svg>
        User Management
      </a>
    </nav>
    <div class="p-6 border-t">
        <p id="welcomeMessage" class="text-sm text-gray-600 truncate">Welcome!</p>
        <button id="logoutButton" class="w-full mt-4 bg-red-500 text-white px-4 py-2 rounded-lg font-semibold shadow-md hover:bg-red-600 transition-colors text-sm">
            Logout
        </button>
    </div>
  </aside>

    <div class="flex-grow p-6 md:p-8 overflow-y-auto">
    <div id="message-container" class="mb-6 sticky top-0 z-50"></div>

    <main>
                <section id="labsSection">
            <h2 class="text-3xl font-bold text-gray-800 mb-6">Lab Management</h2>
            <div class="grid lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1 bg-white p-6 rounded-xl shadow-lg border">
                    <h3 class="text-xl font-bold text-gray-700 mb-4">Add New Lab</h3>
                    <form id="addLabForm" class="space-y-4"></form>
                </div>
                <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow-lg border">
                    <h3 class="text-xl font-bold text-gray-700 mb-4">Existing Labs</h3>
                    <div id="labsList" class="space-y-4 max-h-[60vh] overflow-y-auto"></div>
                </div>
            </div>
        </section>

                <section id="requirementsSection" class="hidden">
             <h2 class="text-3xl font-bold text-gray-800 mb-6">Lab Requirements</h2>
            <div class="bg-white p-6 rounded-xl shadow-lg border">
                <div id="requirementsList" class="space-y-6 max-h-[75vh] overflow-y-auto"></div>
            </div>
        </section>
        
                <section id="suggestionsSection" class="hidden">
            <h2 class="text-3xl font-bold text-gray-800 mb-6">Component Suggestions (Student Requests)</h2>
            <div class="bg-white p-6 rounded-xl shadow-lg border">
                <div id="suggestionsList" class="space-y-4 max-h-[75vh] overflow-y-auto">
                                    </div>
            </div>
        </section>

                <section id="maintenanceSection" class="hidden">
             <h2 class="text-3xl font-bold text-gray-800 mb-6">Maintenance Approvals</h2>
            <div class="bg-white p-6 rounded-xl shadow-lg border">
                <div id="maintenanceList" class="space-y-4 max-h-[75vh] overflow-y-auto"></div>
            </div>
        </section>

                <section id="usersSection" class="hidden">
            <h2 class="text-3xl font-bold text-gray-800 mb-6">User Management</h2>
            <div class="bg-white p-6 rounded-xl shadow-lg border">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-bold text-gray-700">All Registered Users</h3>
                    <div class="flex items-center space-x-4">
                        <select id="userRoleFilter" class="p-2 border border-gray-300 rounded-md bg-white text-sm focus:ring-indigo-500 focus:border-indigo-500">
                            <option value="all">Filter by Role: All</option>
                            <option value="master">Master Admins</option>
                            <option value="incharge">Incharges</option>
                            <option value="assistant">Assistants</option>
                            <option value="student">Students</option>
                        </select>
                        <button id="addUserBtn" class="bg-indigo-600 text-white py-2 px-4 rounded-lg font-semibold hover:bg-indigo-700 transition-colors text-sm">Add New User</button>
                    </div>
                </div>
                <div id="usersList" class="space-y-2 max-h-96 overflow-y-auto"></div>
            </div>
        </section>
    </main>
  </div>

    <div id="modalContainer"></div>

  <script type="module" src="master_dashboard.js"></script>
</body>
</html>
