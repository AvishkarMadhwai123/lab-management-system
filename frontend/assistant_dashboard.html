<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistant Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    .modal { backdrop-filter: blur(4px); }
    .sidebar-link.active { background-color: #eef2ff; color: #4338ca; border-left: 4px solid #4f46e5; }
    .sidebar-link { transition: all 0.2s ease-in-out; border-left: 4px solid transparent; }
    .sidebar-link:hover { background-color: #f0f2f5; }
    .request-tab-btn.active { border-color: #4f46e5; color: #4f46e5; background-color: #eef2ff; }
  </style>
</head>
<body class="flex min-h-screen">

  <!-- Sidebar Navigation -->
  <aside class="w-64 bg-white shadow-lg flex flex-col flex-shrink-0">
    <div class="p-6 border-b text-center">
      <h1 class="text-2xl font-bold text-indigo-600">ECE Labs</h1>
      <p class="text-sm text-gray-500">Assistant Panel</p>
    </div>
    <nav class="flex-grow pt-4">
      <a href="#" id="labsTab" class="sidebar-link active flex items-center px-6 py-3 text-gray-700 font-semibold">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3" viewBox="0 0 20 20" fill="currentColor"><path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v5a2 2 0 01-2 2H4a2 2 0 01-2-2v-5z" /></svg>
        My Labs
      </a>
      <a href="#" id="requestsTab" class="sidebar-link flex items-center px-6 py-3 text-gray-700 font-semibold">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3" viewBox="0 0 20 20" fill="currentColor"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z" /><path fill-rule="evenodd" d="M4 5a2 2 0 012-2h8a2 2 0 012 2v10a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 011-1h6a1 1 0 110 2H8a1 1 0 01-1-1zm-1 4a1 1 0 100 2h6a1 1 0 100-2H6z" clip-rule="evenodd" /></svg>
        Student Requests
      </a>
       <a href="#" id="requirementsTab" class="sidebar-link flex items-center px-6 py-3 text-gray-700 font-semibold">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-11a1 1 0 10-2 0v2H7a1 1 0 100 2h2v2a1 1 0 102 0v-2h2a1 1 0 100-2h-2V7z" clip-rule="evenodd" /></svg>
        Lab Requirements
      </a>
      <a href="#" id="complaintsTab" class="sidebar-link flex items-center px-6 py-3 text-gray-700 font-semibold">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" /></svg>
        Complaints
      </a>
      
      <!-- NEW: Student View Button -->
      <div class="px-6 pt-4"><hr></div>
      <a href="student_dashboard.html" class="sidebar-link flex items-center px-6 py-3 text-gray-700 font-semibold mt-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-3" viewBox="0 0 20 20" fill="currentColor"><path d="M10 12a2 2 0 100-4 2 2 0 000 4z" /><path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.022 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd" /></svg>
        Student View
      </a>
    </nav>
    <div class="p-6 border-t">
        <p id="welcomeMessage" class="text-sm text-gray-600 truncate">Welcome!</p>
        <button id="logoutButton" class="w-full mt-4 bg-red-500 text-white px-4 py-2 rounded-lg font-semibold shadow-md hover:bg-red-600 transition-colors text-sm">
            Logout
        </button>
    </div>
  </aside>

  <!-- Main Content Area (No changes here) -->
  <div class="flex-grow p-6 md:p-8 overflow-y-auto">
    <div id="message-container" class="mb-6 sticky top-0 z-50"></div>
    <main>
        <section id="labsSection">
            <h2 class="text-3xl font-bold text-gray-800 mb-6">My Assigned Labs</h2>
            <div id="labsList" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8"></div>
        </section>
        <section id="requestsSection" class="hidden">
            <h2 class="text-3xl font-bold text-gray-800 mb-6">Student Component Requests</h2>
            <div class="border-b border-gray-200 mb-4">
                <nav class="-mb-px flex space-x-6">
                    <button id="pendingRequestsBtn" class="request-tab-btn active whitespace-nowrap py-3 px-1 border-b-2 font-semibold text-sm">Pending</button>
                    <button id="historyRequestsBtn" class="request-tab-btn whitespace-nowrap py-3 px-1 border-b-2 font-semibold text-sm text-gray-500 hover:text-gray-700">History</button>
                </nav>
            </div>
            <div id="pendingRequestsContainer">
                <div id="studentRequestsList" class="space-y-4"></div>
            </div>
            <div id="historyRequestsContainer" class="hidden">
                <div id="historyRequestsList" class="space-y-4"></div>
            </div>
        </section>
        <section id="requirementsSection" class="hidden">
            <h2 class="text-3xl font-bold text-gray-800 mb-6">Lab Requirements</h2>
            <div class="grid lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1 bg-white p-6 rounded-xl shadow-lg border">
                    <h3 class="text-xl font-bold text-gray-700 mb-4">Request New Component</h3>
                    <form id="requirementForm" class="space-y-4">
                        <div>
                            <label for="reqLabSelect" class="block text-sm font-medium text-gray-700">For Lab <span class="text-red-500">*</span></label>
                            <select id="reqLabSelect" required class="mt-1 block w-full p-2 border border-gray-300 rounded-md shadow-sm bg-white"></select>
                        </div>
                        <div>
                            <label for="reqComponentName" class="block text-sm font-medium text-gray-700">Component Name <span class="text-red-500">*</span></label>
                            <input type="text" id="reqComponentName" required class="mt-1 block w-full p-2 border border-gray-300 rounded-md shadow-sm">
                        </div>
                        <div>
                            <label for="reqQuantity" class="block text-sm font-medium text-gray-700">Quantity <span class="text-red-500">*</span></label>
                            <input type="number" id="reqQuantity" min="1" required class="mt-1 block w-full p-2 border border-gray-300 rounded-md shadow-sm">
                        </div>
                        <div>
                            <label for="reqReason" class="block text-sm font-medium text-gray-700">Reason / Justification</label>
                            <textarea id="reqReason" rows="3" class="mt-1 block w-full p-2 border border-gray-300 rounded-md shadow-sm"></textarea>
                        </div>
                        <div class="pt-2">
                            <button type="submit" class="w-full py-2 px-4 bg-indigo-600 text-white font-semibold rounded-lg shadow-md hover:bg-indigo-700">Submit Requirement</button>
                        </div>
                    </form>
                </div>
                <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow-lg border">
                    <h3 class="text-xl font-bold text-gray-700 mb-4">My Submitted Requirements</h3>
                    <div id="requirementsList" class="space-y-3 max-h-[60vh] overflow-y-auto"></div>
                </div>
            </div>
        </section>
        <section id="complaintsSection" class="hidden">
            <h2 class="text-3xl font-bold text-gray-800 mb-6">Student Complaints</h2>
            <div class="bg-white p-6 rounded-xl shadow-lg border">
                 <div id="complaintsList" class="space-y-4 max-h-[75vh] overflow-y-auto"></div>
            </div>
        </section>
    </main>
  </div>
  <div id="modalContainer"></div>
  <script type="module" src="assistant_dashboard.js"></script>
</body>
</html>
