<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ECE Lab Management System</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif;
        }
        .background {
            background-image: url('https://sanjivani.org.in/wp-content/uploads/2023/05/S11-scaled.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: fixed;
            inset: 0;
            z-index: -1;
        }
        .overlay {
            background-color: rgba(255, 255, 255, 0.7);
            position: fixed;
            inset: 0;
            z-index: -1;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <!-- Background image + faint overlay -->
    <div class="background"></div>
    <div class="overlay"></div>

    <!-- A global container for messages -->
    <div id="message-container" class="absolute top-4 left-1/2 -translate-x-1/2 w-full max-w-md z-50"></div>

    <div class="w-full max-w-md bg-white p-8 rounded-xl shadow-lg border border-gray-200 bg-opacity-95">
        <!-- Login Form Container -->
        <div id="loginFormContainer">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-gray-800">Welcome Back! 👋</h2>
                <p class="text-gray-500 mt-2">Sign in to your account to continue.</p>
            </div>
            <form id="loginForm" class="space-y-6">
                <input type="email" id="loginEmail" placeholder="Email Address" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition-all duration-200" />
                <input type="password" id="loginPassword" placeholder="Password" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 transition-all duration-200" />
                <button type="submit" id="loginButton" 
                        class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold shadow-md hover:bg-indigo-700 transition-all duration-200 transform hover:scale-105">
                    Sign In
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-sm text-gray-600">
                    Don't have an account? 
                    <a href="register.html" class="text-indigo-600 hover:text-indigo-700 font-semibold">Register here</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="api-config.js"></script>
    <script type="module" src="utils.js"></script>
    <script type="module" src="login.js"></script>
</body>
</html>
